linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gofumpt
    - revive
    - unused
    - ineffassign
    - gosimple

linters-settings:
  gofumpt:
    extra-rules: true
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow

run:
  timeout: 5m
