version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - unused
    - ineffassign
  exclusions:
    rules:
      - linters:
          - govet
        # Seek implements chunkenc.Iterator, not io.Seeker.
        text: "stdmethods: method Seek.* should have signature Seek"
  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true

run:
  timeout: 5m
