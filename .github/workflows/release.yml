name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        run: cd web && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: internal/query/dashboard/dist/

  release:
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: internal/query/dashboard/dist/
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.branch=main"
          go build -ldflags "${LDFLAGS}" -o "lil-olt-metrics-${GOOS}-${GOARCH}" ./cmd/server
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lil-olt-metrics-${{ matrix.goos }}-${{ matrix.goarch }}
          path: lil-olt-metrics-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Copy install script
        run: cp scripts/install.sh artifacts/install.sh
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
